version: 3

# ─────────────────────────────────────────────────────────────────────────────
# specmatic.yaml — Root config for the Monday.com BI Agent
#
# Runs contract tests + schema resiliency tests against localhost:8000.
#
# Start the app first:
#   Linux/macOS:  uvicorn main:app --reload --port 8000
#   Windows:      python -m uvicorn main:app --reload --port 8000
#
# Then run Specmatic tests:
#
#   Java:
#     java -jar specmatic.jar test --testBaseURL http://localhost:8000
#
#   npm:
#     npx specmatic test --testBaseURL http://localhost:8000
#
#   Linux/macOS Docker:
#     docker run --rm -p 9000:9000 \
#       -v "$(pwd)":/specmatic \
#       -w /specmatic \
#       specmatic/specmatic test \
#       --testBaseURL http://host.docker.internal:8000
#
#   Linux Docker (no host.docker.internal):
#     HOST_IP=$(hostname -I | awk '{print $1}')
#     docker run --rm \
#       -v "$(pwd)":/specmatic \
#       -w /specmatic \
#       specmatic/specmatic test \
#       --testBaseURL http://$HOST_IP:8000
#
#   Windows Docker (PowerShell):
#     docker run --rm `
#       -v "$(Get-Location):/specmatic" `
#       -w /specmatic `
#       specmatic/specmatic test `
#       --testBaseURL http://host.docker.internal:8000
#
#   Windows Docker (CMD):
#     docker run --rm ^
#       -v "%cd%":/specmatic ^
#       -w /specmatic ^
#       specmatic/specmatic test ^
#       --testBaseURL http://host.docker.internal:8000
#
# Mock mode (serve stubs on port 9000):
#   java -jar specmatic.jar mock
#   npx specmatic mock
# ─────────────────────────────────────────────────────────────────────────────

systemUnderTest:
  service:
    $ref: "#/components/services/mondayBiAgentService"
  runOptions:
    $ref: "#/components/runOptions/mondayBiAgentTest"

dependencies:
  services: []

components:
  sources:
    localSpecs:
      filesystem:
        directory: specmatic

  services:
    mondayBiAgentService:
      definitions:
        # Primary API contract
        - definition:
            source:
              $ref: "#/components/sources/localSpecs"
            specs:
              - contracts/openapi.yaml


  runOptions:
    mondayBiAgentTest:
      openapi:
        type: test
        baseUrl: http://localhost:8000


# --- Resiliency Tests ---

openapi: 3.0.3
info:
  title: Monday.com BI Agent — Schema Resiliency Tests
  version: "1.0"
  description: |
    Supplementary OpenAPI spec dedicated to schema resiliency testing.
    These scenarios probe edge cases that happy-path tests never reach:
    
    • Extra/unknown fields in request body
    • Missing optional fields (server must default gracefully)
    • Wrong types (integer where string is expected)
    • Null values for required fields
    • Boundary values (very long strings, zero-length)
    • Missing required HTTP headers
    • Empty session with no prior history
    • Injection-style strings passed as query values
    
    All resiliency stubs live in specmatic/stubs/resiliency/.
    Each stub JSON file carries a "_comment" key explaining the bug
    it is designed to catch and the expected server behavior.
    
    How Specmatic uses these:
    - In MOCK mode: returns the stub response when the request matches
    - In TEST mode: Specmatic generates boundary/negative variants
      automatically from the schema constraints (minLength, required,
      type) in addition to your named examples

servers:
  - url: http://localhost:8000
    description: Local development server

paths:

  /query:
    post:
      summary: Submit a BI query — resiliency scenarios
      operationId: handleQueryResiliency
      tags:
        - Resiliency
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                  minLength: 1
                  maxLength: 10000
                  description: The BI question
                session_id:
                  type: string
                  description: Session identifier (optional, defaults to 'default')
            examples:
              # ── Happy path (baseline) ────────────────────────────
              QUERY_BASELINE:
                summary: Baseline — minimal valid request
                value:
                  query: "What is our pipeline?"
                  session_id: "session-001"

              # ── Missing optional field ───────────────────────────
              QUERY_NO_SESSION_ID:
                summary: |
                  Missing optional session_id.
                  Bug caught: KeyError on conversation_memory['default']
                  when 'default' key was never initialized.
                value:
                  query: "How many drones were serviced this month?"

              # ── Extra/unknown fields ─────────────────────────────
              QUERY_EXTRA_FIELDS:
                summary: |
                  Unknown fields in request body.
                  Bug caught: Server crashes if it passes **kwargs to
                  Pydantic model without extra='ignore' config.
                value:
                  query: "What is our pipeline?"
                  session_id: "session-extra"
                  unknown_field: "should be ignored"
                  injected_param: true

              # ── Injection attempt ────────────────────────────────
              QUERY_INJECTION:
                summary: |
                  SQL/script injection in query string.
                  Bug caught: Raw query string reflected into an
                  unescaped context (logs, DB, HTML response).
                value:
                  query: "'; DROP TABLE sessions; -- What is our pipeline?"
                  session_id: "session-injection"

              # ── Boundary: very long string ───────────────────────
              QUERY_MAX_LENGTH:
                summary: |
                  Near-maxLength query (boundary value).
                  Bug caught: LLM token limit exceeded → unhandled
                  exception from Groq/Anthropic SDK → 500.
                value:
                  query: "Provide a very comprehensive analysis of all revenue, pipeline, work orders, sector performance, hiring needs, and strategic outlook for Skylark Drones. Include all quarters, all sectors, all account managers, all deal stages. This is a boundary value test to confirm that even at maximum input size the system degrades gracefully without returning HTTP 500 or exposing an internal traceback to the client."
                  session_id: "session-boundary"

      responses:
        "200":
          description: Valid BI answer (happy path and graceful edge cases)
          content:
            application/json:
              schema:
                type: object
                required: [answer, trace, elapsed, wo_count, deals_count, source]
                properties:
                  answer:
                    type: string
                  trace:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  elapsed:
                    type: number
                  wo_count:
                    type: integer
                    minimum: 0
                  deals_count:
                    type: integer
                    minimum: 0
                  source:
                    type: string
                    enum: [monday_live]
              examples:
                QUERY_BASELINE:
                  value:
                    answer: "The total open deal pipeline is $2.4M across 15 active deals."
                    trace:
                      - { step: "fetch_monday_data", elapsed_seconds: 0.82 }
                      - { step: "ask_llm", elapsed_seconds: 1.45 }
                      - { step: "complete", elapsed_seconds: 2.31, memory_size: 1 }
                    elapsed: 2.31
                    wo_count: 150
                    deals_count: 75
                    source: monday_live
                QUERY_NO_SESSION_ID:
                  value:
                    answer: "12 drones were serviced this month based on Work Orders board data."
                    trace:
                      - { step: "fetch_monday_data", elapsed_seconds: 0.90 }
                      - { step: "ask_llm", elapsed_seconds: 1.60 }
                      - { step: "complete", elapsed_seconds: 2.55, memory_size: 0 }
                    elapsed: 2.55
                    wo_count: 150
                    deals_count: 75
                    source: monday_live
                QUERY_EXTRA_FIELDS:
                  value:
                    answer: "The total open deal pipeline is $2.4M across 15 active deals."
                    trace:
                      - { step: "fetch_monday_data", elapsed_seconds: 0.82 }
                      - { step: "ask_llm", elapsed_seconds: 1.45 }
                      - { step: "complete", elapsed_seconds: 2.31, memory_size: 0 }
                    elapsed: 2.31
                    wo_count: 150
                    deals_count: 75
                    source: monday_live
                QUERY_INJECTION:
                  value:
                    answer: "The pipeline data has been analyzed."
                    trace:
                      - { step: "fetch_monday_data", elapsed_seconds: 0.82 }
                      - { step: "ask_llm", elapsed_seconds: 1.45 }
                      - { step: "complete", elapsed_seconds: 2.31, memory_size: 0 }
                    elapsed: 2.31
                    wo_count: 150
                    deals_count: 75
                    source: monday_live
                QUERY_MAX_LENGTH:
                  value:
                    answer: "Comprehensive analysis complete. Revenue forecast and pipeline summary generated."
                    trace:
                      - { step: "fetch_monday_data", elapsed_seconds: 0.85 }
                      - { step: "ask_llm", elapsed_seconds: 3.20 }
                      - { step: "complete", elapsed_seconds: 4.10, memory_size: 0 }
                    elapsed: 4.10
                    wo_count: 150
                    deals_count: 75
                    source: monday_live

        "422":
          description: |
            Schema validation failure.
            Triggered by: empty query, null required field, wrong type.
            Must NEVER be a 500 — validation errors must be caught at
            the Pydantic layer before reaching business logic.
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    oneOf:
                      - type: string
                      - type: array
                        items:
                          type: object
                          additionalProperties: true
              examples:
                QUERY_EMPTY_STRING:
                  summary: Empty string rejected by minLength:1
                  value:
                    detail:
                      - loc: ["body", "query"]
                        msg: "ensure this value has at least 1 characters"
                        type: "value_error.any_str.min_length"
                QUERY_NULL_FIELD:
                  summary: Null for required non-nullable field
                  value:
                    detail:
                      - loc: ["body", "query"]
                        msg: "none is not an allowed value"
                        type: "type_error.none.not_allowed"
                QUERY_WRONG_TYPE:
                  summary: Integer sent where string is required
                  value:
                    detail:
                      - loc: ["body", "query"]
                        msg: "str type expected"
                        type: "type_error.str"
                QUERY_MISSING_CONTENT_TYPE:
                  summary: No Content-Type header on POST
                  value:
                    detail: "Content-Type must be application/json"

  /memory:
    get:
      summary: View memory — resiliency scenarios
      operationId: getMemoryResiliency
      tags:
        - Resiliency
      parameters:
        - name: session_id
          in: query
          required: false
          schema:
            type: string
          description: |
            Optional. Defaults to 'default'.
            Resiliency check: server must NOT throw KeyError when 'default'
            key has never been written to conversation_memory dict.
          examples:
            GET_MEMORY_NO_PARAM:
              summary: No session_id — defaults to 'default'
              value: ""
            GET_MEMORY_NEVER_WRITTEN:
              summary: session_id for a session that never sent a query
              value: "session-brand-new"
      responses:
        "200":
          description: Returns session memory, empty list for new sessions
          content:
            application/json:
              schema:
                type: object
                required: [sessions]
                properties:
                  sessions:
                    type: array
                    items:
                      type: object
                      required: [query, answer, timestamp]
                      properties:
                        query:
                          type: string
                        answer:
                          type: string
                        timestamp:
                          type: string
                          format: date-time
              examples:
                GET_MEMORY_NO_PARAM:
                  summary: Empty list for default session
                  value:
                    sessions: []
                GET_MEMORY_NEVER_WRITTEN:
                  summary: Empty list for a brand-new session (never queried)
                  value:
                    sessions: []
