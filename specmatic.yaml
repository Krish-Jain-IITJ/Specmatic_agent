version: 3

# ─────────────────────────────────────────────────────────────────────────────
# specmatic.yaml — Root config for the Monday.com BI Agent
#
# Runs contract tests against localhost:8000.
#
# Start the app first:
#   Windows:  python -m uvicorn main:app --reload --port 8000
#
# Then run Specmatic tests:
#   docker run --network host --rm \
#     -v "$(pwd)":/specmatic \
#     -w /specmatic \
#     specmatic/specmatic test --testBaseURL http://localhost:8000
# ─────────────────────────────────────────────────────────────────────────────

systemUnderTest:
  service:
    $ref: "#/components/services/mondayBiAgentService"

components:
  sources:
    localSpecs:
      filesystem:
        directory: specmatic/contracts

  services:
    mondayBiAgentService:
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/localSpecs"
            specs:
              - openapi.yaml
