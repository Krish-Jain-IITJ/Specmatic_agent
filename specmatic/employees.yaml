openapi: 3.0.0
info:
  title: Employees
  version: "1.0"
servers: []

paths:
  /employees:
    # ─────────────────────────────────────────────
    # POST /employees — Create a new employee
    #
    # Named example: CREATE_EMPLOYEE_SUCCESS
    #   • Specmatic matches the incoming request body against the
    #     request example with this name.
    #   • It then returns the response example that shares the
    #     same name (CREATE_EMPLOYEE_SUCCESS) → { "id": 10 }
    # ─────────────────────────────────────────────
    post:
      summary: Create a new employee
      operationId: createEmployee
      tags:
        - Employees
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Employee"
            examples:
              CREATE_EMPLOYEE_SUCCESS:
                summary: Happy-path employee creation
                value:
                  name: Jill Doe
                  department: Engineering
                  designation: Director
      responses:
        "201":
          description: Employee Created Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                properties:
                  id:
                    type: integer
                    description: Auto-assigned employee ID
              examples:
                # Name MUST match the request example so Specmatic
                # links them into a single test scenario.
                CREATE_EMPLOYEE_SUCCESS:
                  summary: Returns the newly created employee's ID
                  value:
                    id: 10

    # ─────────────────────────────────────────────
    # DELETE /employees — Remove an employee by ID
    #
    # Named example: DELETE_EMPLOYEE_SUCCESS
    #   • Response 204 has NO body.
    #   • Because the response has no body, Specmatic automatically
    #     binds ALL request examples that lack a matching response
    #     example to the no-body response — so DELETE_EMPLOYEE_SUCCESS
    #     is automatically tied to 204 No Content.
    # ─────────────────────────────────────────────
    delete:
      summary: Delete an employee by ID
      operationId: deleteEmployee
      tags:
        - Employees
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
              properties:
                id:
                  type: integer
                  description: ID of the employee to delete
            examples:
              DELETE_EMPLOYEE_SUCCESS:
                summary: Delete employee with id 10
                value:
                  id: 10
              DELETE_EMPLOYEE_NOT_FOUND:
                summary: Attempt to delete a non-existent employee (also no-body response)
                value:
                  id: 9999
      responses:
        "204":
          description: >
            No Content — employee deleted successfully.
            No response body is returned; Specmatic automatically
            binds all request examples (DELETE_EMPLOYEE_SUCCESS,
            DELETE_EMPLOYEE_NOT_FOUND) to this no-body response.

components:
  schemas:
    Employee:
      type: object
      required:
        - name
        - department
        - designation
      properties:
        name:
          type: string
          example: Jill Doe
        department:
          type: string
          example: Engineering
        designation:
          type: string
          example: Director
