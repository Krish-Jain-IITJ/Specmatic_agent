openapi: 3.0.3
info:
  title: Monday.com BI Agent
  version: "1.0"
  description: Business Intelligence agent for Monday.com work orders and deals data

servers:
  - url: http://localhost:8000
    description: Local development server

paths:
  /:
    get:
      summary: Serve the chat UI
      operationId: getIndex
      tags:
        - UI
      responses:
        "200":
          description: HTML chat interface
          content:
            text/html:
              schema:
                type: string
              examples:
                GET_INDEX_SUCCESS:
                  summary: Returns the chat UI HTML page
                  value: "<html><body>Monday BI Agent</body></html>"

  /health:
    get:
      summary: Health check and configuration status
      operationId: getHealth
      tags:
        - System
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status, monday_configured, groq_configured, memory_sessions]
                properties:
                  status:
                    type: string
                    example: ok
                  monday_configured:
                    type: boolean
                    description: Monday.com API key and board IDs are configured
                  groq_configured:
                    type: boolean
                    description: Groq API key is configured
                  memory_sessions:
                    type: integer
                    description: Number of conversations in memory
                    minimum: 0
              examples:
                # ── Named inline example ──────────────────────────────
                # Specmatic uses GET_HEALTH_SUCCESS as a contract test:
                # it hits GET /health and expects this exact response shape.
                GET_HEALTH_SUCCESS:
                  summary: All integrations configured and healthy
                  value:
                    status: ok
                    monday_configured: true
                    groq_configured: true
                    memory_sessions: 0
                GET_HEALTH_PARTIAL:
                  summary: App running but Groq not yet configured
                  value:
                    status: ok
                    monday_configured: true
                    groq_configured: false
                    memory_sessions: 0

  /quality-report:
    get:
      summary: Retrieve the data quality report
      operationId: getQualityReport
      tags:
        - Data
      responses:
        "200":
          description: Quality report for cleaned data
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              examples:
                GET_QUALITY_REPORT_SUCCESS:
                  summary: Returns data quality metrics for Monday.com boards
                  value:
                    work_orders:
                      total_rows: 150
                      missing_status: 3
                      missing_assignee: 12
                    deals:
                      total_rows: 75
                      missing_value: 5
                      missing_stage: 2

  /memory:
    get:
      summary: View conversation memory for the current session
      operationId: getMemory
      tags:
        - Memory
      parameters:
        - name: session_id
          in: query
          schema:
            type: string
          description: Session identifier (defaults to 'default' if not provided)
          examples:
            GET_MEMORY_SESSION_001:
              summary: Fetch memory for session-001
              value: session-001
            # ── Resiliency param examples ─────────────────────────────────
            GET_MEMORY_NO_PARAM:
              summary: No session_id — defaults to 'default'
              value: ""
            GET_MEMORY_NEVER_WRITTEN:
              summary: session_id for a session that never sent a query
              value: "session-brand-new"
      responses:
        "200":
          description: Session memory retrieved
          content:
            application/json:
              schema:
                type: object
                required: [sessions]
                properties:
                  sessions:
                    type: array
                    items:
                      type: object
                      required: [query, answer, timestamp]
                      properties:
                        query:
                          type: string
                        answer:
                          type: string
                        timestamp:
                          type: string
                          format: date-time
              examples:
                # ── Named inline example ──────────────────────────────
                # Specmatic matches GET /memory?session_id=session-001
                # and returns the GET_MEMORY_SESSION_001 response below.
                GET_MEMORY_SESSION_001:
                  summary: Memory for session-001 with one prior conversation
                  value:
                    sessions:
                      - query: "What is our deal pipeline value?"
                        answer: "The total open deal pipeline is $2.4M across 15 active deals."
                        timestamp: "2026-07-09T07:00:00Z"
                GET_MEMORY_EMPTY:
                  summary: Empty memory for a brand-new session
                  value:
                    sessions: []
                # ── Resiliency scenarios ──────────────────────────────────────
                GET_MEMORY_NO_PARAM:
                  summary: No session_id param — defaults to 'default', returns empty list
                  value:
                    sessions: []
                GET_MEMORY_NEVER_WRITTEN:
                  summary: session_id for a session that never sent a query — returns empty list
                  value:
                    sessions: []

    delete:
      summary: Clear conversation memory for the current session
      operationId: deleteMemory
      tags:
        - Memory
      parameters:
        - name: session_id
          in: query
          schema:
            type: string
          description: Session identifier (defaults to 'default' if not provided)
          examples:
            DELETE_MEMORY_SESSION_001:
              summary: Clear memory for session-001
              value: session-001
      responses:
        "200":
          description: Memory cleared successfully
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: cleared
              examples:
                DELETE_MEMORY_SESSION_001:
                  summary: Memory for session-001 cleared
                  value:
                    status: cleared

  /query:
    post:
      summary: Submit a business intelligence query
      operationId: handleQuery
      tags:
        - Query
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              additionalProperties: true
              properties:
                query:
                  type: string
                  minLength: 1
                  maxLength: 10000
                  description: The business question to answer
                  example: What is our current deal pipeline value?
                session_id:
                  type: string
                  description: Session identifier for isolating conversation memory
                  example: session-001
            examples:
              # ── Named inline examples ─────────────────────────────
              # Each name here MUST match the name under responses so
              # Specmatic ties them into a single test scenario:
              #
              #   Request example name  →  Response example name
              #   QUERY_PIPELINE_SUCCESS   →  QUERY_PIPELINE_SUCCESS  (200)
              #   QUERY_UPSTREAM_ERROR     →  QUERY_UPSTREAM_ERROR    (502)
              #   QUERY_CONFIG_ERROR       →  QUERY_CONFIG_ERROR      (503)
              #
              QUERY_PIPELINE_SUCCESS:
                summary: Happy-path pipeline value question
                value:
                  query: "What is our current deal pipeline value?"
                  session_id: "session-001"
              QUERY_WORKORDERS_SUCCESS:
                summary: Happy-path historical analytics question
                value:
                  query: "How many work orders were completed in Q2?"
                  session_id: "session-002"
              QUERY_UPSTREAM_ERROR:
                summary: Simulates a Monday.com upstream failure
                value:
                  query: "Show me top deals"
                  session_id: "session-003"
              QUERY_CONFIG_ERROR:
                summary: Simulates missing Groq API key (service unavailable)
                value:
                  query: "What is our revenue forecast?"
                  session_id: "session-004"
              # ── Resiliency scenarios ──────────────────────────────────────
              QUERY_NO_SESSION_ID:
                summary: Missing optional session_id — server must default to 'default'
                value:
                  query: "How many drones were serviced this month?"
              QUERY_EXTRA_FIELDS:
                summary: Unknown fields in request body — must be silently ignored
                value:
                  query: "What is our pipeline?"
                  session_id: "session-extra"
                  unknown_field: "should be ignored"
                  injected_param: true
              QUERY_INJECTION:
                summary: SQL/script injection string — must be handled safely
                value:
                  query: "'; DROP TABLE sessions; -- What is our pipeline?"
                  session_id: "session-injection"
              QUERY_MAX_LENGTH:
                summary: Near-maxLength query — server must not crash or return 500
                value:
                  query: "Provide a very comprehensive analysis of all revenue, pipeline, work orders, sector performance, hiring needs, and strategic outlook for Skylark Drones. Include all quarters, all sectors, all account managers, all deal stages. This is a boundary value test to confirm that even at maximum input size the system degrades gracefully without returning HTTP 500 or exposing an internal traceback to the client."
                  session_id: "session-boundary"
              QUERY_EMPTY_STRING:
                summary: Empty string — rejected by minLength:1, must return 422
                value:
                  query: ""
                  session_id: "session-empty"
              QUERY_NULL_FIELD:
                summary: Null for required non-nullable field — must return 422
                value:
                  query: null
                  session_id: "session-null"
              QUERY_WRONG_TYPE:
                summary: Integer where string expected — must return 422
                value:
                  query: 12345
                  session_id: "session-wrongtype"
      responses:
        "200":
          description: Query processed successfully and answer generated
          content:
            application/json:
              schema:
                type: object
                required: [answer, trace, elapsed, wo_count, deals_count, source]
                properties:
                  answer:
                    type: string
                    description: The AI-generated business intelligence answer
                  trace:
                    type: array
                    description: Detailed execution trace for debugging
                    items:
                      type: object
                      additionalProperties: true
                  elapsed:
                    type: number
                    description: Query execution time in seconds
                    example: 2.35
                  wo_count:
                    type: integer
                    description: Number of work orders fetched
                    example: 150
                  deals_count:
                    type: integer
                    description: Number of deals fetched
                    example: 75
                  source:
                    type: string
                    enum: [monday_live]
                    description: Data source used for the query
              examples:
                QUERY_PIPELINE_SUCCESS:
                  summary: Successful pipeline analysis response
                  value:
                    answer: "The total open deal pipeline is $2.4M across 15 active deals. Top sector: Energy ($900K)."
                    trace:
                      - step: fetch_monday_data
                        elapsed_seconds: 0.82
                      - step: ask_llm
                        elapsed_seconds: 1.45
                      - step: complete
                        elapsed_seconds: 2.31
                        memory_size: 1
                    elapsed: 2.31
                    wo_count: 150
                    deals_count: 75
                    source: monday_live
                QUERY_WORKORDERS_SUCCESS:
                  summary: Successful Q2 work order analytics response
                  value:
                    answer: "42 work orders were completed in Q2 2026. Average completion time was 4.2 days."
                    trace:
                      - step: fetch_monday_data
                        elapsed_seconds: 0.75
                      - step: ask_llm
                        elapsed_seconds: 1.30
                      - step: complete
                        elapsed_seconds: 2.10
                        memory_size: 1
                    elapsed: 2.10
                    wo_count: 150
                    deals_count: 75
                    source: monday_live
                # ── Resiliency 200 responses ──────────────────────────────
                QUERY_NO_SESSION_ID:
                  summary: Successful response when session_id is omitted
                  value:
                    answer: "12 drones were serviced this month."
                    trace:
                      - step: fetch_monday_data
                        elapsed_seconds: 0.90
                      - step: ask_llm
                        elapsed_seconds: 1.60
                      - step: complete
                        elapsed_seconds: 2.55
                        memory_size: 0
                    elapsed: 2.55
                    wo_count: 150
                    deals_count: 75
                    source: monday_live
                QUERY_EXTRA_FIELDS:
                  summary: Server ignores unknown fields and answers normally
                  value:
                    answer: "The total open deal pipeline is $2.4M across 15 active deals."
                    trace:
                      - step: fetch_monday_data
                        elapsed_seconds: 0.82
                      - step: ask_llm
                        elapsed_seconds: 1.45
                      - step: complete
                        elapsed_seconds: 2.31
                        memory_size: 0
                    elapsed: 2.31
                    wo_count: 150
                    deals_count: 75
                    source: monday_live
                QUERY_INJECTION:
                  summary: Injection string treated as plain text, safe answer returned
                  value:
                    answer: "The pipeline data has been analyzed."
                    trace:
                      - step: fetch_monday_data
                        elapsed_seconds: 0.82
                      - step: ask_llm
                        elapsed_seconds: 1.45
                      - step: complete
                        elapsed_seconds: 2.31
                        memory_size: 0
                    elapsed: 2.31
                    wo_count: 150
                    deals_count: 75
                    source: monday_live
                QUERY_MAX_LENGTH:
                  summary: Very long query handled gracefully
                  value:
                    answer: "Comprehensive analysis complete."
                    trace:
                      - step: fetch_monday_data
                        elapsed_seconds: 0.85
                      - step: ask_llm
                        elapsed_seconds: 3.20
                      - step: complete
                        elapsed_seconds: 4.10
                        memory_size: 0
                    elapsed: 4.10
                    wo_count: 150
                    deals_count: 75
                    source: monday_live

        "422":
          description: Validation error (malformed request body, missing required fields)
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    oneOf:
                      - type: string
                      - type: array
                        items:
                          type: object
                          additionalProperties: true
              examples:
                QUERY_VALIDATION_ERROR:
                  summary: Empty query field rejected
                  value:
                    detail:
                      - loc: ["body", "query"]
                        msg: "field required"
                        type: "value_error.missing"
                QUERY_EMPTY_STRING:
                  summary: Empty string rejected by minLength:1
                  value:
                    detail:
                      - loc: ["body", "query"]
                        msg: "ensure this value has at least 1 characters"
                        type: "value_error.any_str.min_length"
                QUERY_NULL_FIELD:
                  summary: Null for required non-nullable field
                  value:
                    detail:
                      - loc: ["body", "query"]
                        msg: "none is not an allowed value"
                        type: "type_error.none.not_allowed"
                QUERY_WRONG_TYPE:
                  summary: Integer sent where string is required
                  value:
                    detail:
                      - loc: ["body", "query"]
                        msg: "str type expected"
                        type: "type_error.str"

        "502":
          description: Bad gateway - upstream service call to Monday.com or Groq failed
          content:
            application/json:
              schema:
                type: object
                required: [answer, trace, error]
                properties:
                  answer:
                    type: string
                    description: Error message explaining what failed
                    example: "❌ Failed to fetch Monday data: Connection timeout"
                  trace:
                    type: array
                    description: Execution trace up to the failure point
                    items:
                      type: object
                      additionalProperties: true
                  error:
                    type: boolean
                    const: true
              examples:
                # Name matches request example QUERY_UPSTREAM_ERROR →
                # Specmatic returns this 502 when that request arrives.
                QUERY_UPSTREAM_ERROR:
                  summary: Monday.com API timed out
                  value:
                    answer: "❌ Failed to fetch Monday data: Connection timeout"
                    trace:
                      - step: fetch_monday_data
                        elapsed_seconds: 10.0
                        error: "Connection timeout after 10s"
                    error: true

        "503":
          description: Service unavailable - Groq or Monday.com not configured
          content:
            application/json:
              schema:
                type: object
                required: [answer, trace, error]
                properties:
                  answer:
                    type: string
                    description: Configuration error message
                    example: "⚠️ Groq API Key not set in environment variables"
                  trace:
                    type: array
                    description: Request trace including configuration check details
                    items:
                      type: object
                      additionalProperties: true
                  error:
                    type: boolean
                    const: true
              examples:
                # Name matches request example QUERY_CONFIG_ERROR →
                # Specmatic returns this 503 when that request arrives.
                QUERY_CONFIG_ERROR:
                  summary: Groq API key missing from environment
                  value:
                    answer: "⚠️ Groq API Key not set in environment variables"
                    trace:
                      - step: config_check
                        groq_configured: false
                        monday_configured: true
                    error: true

  /actuator/health:
    get:
      summary: Actuator health endpoint
      operationId: actuatorHealth
      tags:
        - Actuator
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
              examples:
                ACTUATOR_HEALTH_SUCCESS:
                  value:
                    status: "UP"

  /actuator/info:
    get:
      summary: Actuator info endpoint
      operationId: actuatorInfo
      tags:
        - Actuator
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  app:
                    type: object
                    properties:
                      name:
                        type: string
                      description:
                        type: string
                      version:
                        type: string
              examples:
                ACTUATOR_INFO_SUCCESS:
                  value:
                    app:
                      name: "Monday.com BI Agent"
                      description: "BI Agent with Specmatic Contract Testing"
                      version: "1.0.0"
