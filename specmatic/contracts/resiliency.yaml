openapi: 3.0.3
info:
  title: Monday.com BI Agent — Schema Resiliency Tests
  version: "1.0"
  description: |
    Supplementary OpenAPI spec dedicated to schema resiliency testing.
    These scenarios probe edge cases that happy-path tests never reach:
    • Extra/unknown fields in request body
    • Missing optional fields (server must default gracefully)
    • Wrong types (integer where string is expected)
    • Null values for required fields
    • Boundary values (very long strings, zero-length)
    • Missing required HTTP headers
    • Empty session with no prior history
    • Injection-style strings passed as query values

servers:
  - url: http://localhost:8000
    description: Local development server

paths:

  /query:
    post:
      summary: Submit a BI query — resiliency scenarios
      operationId: handleQueryResiliency
      tags:
        - Resiliency
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                  minLength: 1
                  maxLength: 10000
                  description: The BI question
                session_id:
                  type: string
                  description: Session identifier (optional, defaults to 'default')
            examples:
              QUERY_BASELINE:
                summary: Baseline — minimal valid request
                value:
                  query: "What is our pipeline?"
                  session_id: "session-001"

              QUERY_NO_SESSION_ID:
                summary: Missing optional session_id
                value:
                  query: "How many drones were serviced this month?"

              QUERY_EXTRA_FIELDS:
                summary: Unknown fields in request body — must be ignored
                value:
                  query: "What is our pipeline?"
                  session_id: "session-extra"
                  unknown_field: "should be ignored"
                  injected_param: true

              QUERY_INJECTION:
                summary: SQL/script injection in query string
                value:
                  query: "'; DROP TABLE sessions; -- What is our pipeline?"
                  session_id: "session-injection"

              QUERY_MAX_LENGTH:
                summary: Near-maxLength query (boundary value)
                value:
                  query: "Provide a very comprehensive analysis of all revenue, pipeline, work orders, sector performance, hiring needs, and strategic outlook for Skylark Drones. Include all quarters, all sectors, all account managers, all deal stages. This is a boundary value test to confirm that even at maximum input size the system degrades gracefully without returning HTTP 500 or exposing an internal traceback to the client."
                  session_id: "session-boundary"

      responses:
        "200":
          description: Valid BI answer (happy path and graceful edge cases)
          content:
            application/json:
              schema:
                type: object
                required: [answer, trace, elapsed, wo_count, deals_count, source]
                properties:
                  answer:
                    type: string
                  trace:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  elapsed:
                    type: number
                  wo_count:
                    type: integer
                    minimum: 0
                  deals_count:
                    type: integer
                    minimum: 0
                  source:
                    type: string
                    enum: [monday_live]
              examples:
                QUERY_BASELINE:
                  value:
                    answer: "The total open deal pipeline is $2.4M across 15 active deals."
                    trace:
                      - {step: "fetch_monday_data", elapsed_seconds: 0.82}
                      - {step: "ask_llm", elapsed_seconds: 1.45}
                      - {step: "complete", elapsed_seconds: 2.31, memory_size: 1}
                    elapsed: 2.31
                    wo_count: 150
                    deals_count: 75
                    source: monday_live
                QUERY_NO_SESSION_ID:
                  value:
                    answer: "12 drones were serviced this month."
                    trace:
                      - {step: "fetch_monday_data", elapsed_seconds: 0.90}
                      - {step: "ask_llm", elapsed_seconds: 1.60}
                      - {step: "complete", elapsed_seconds: 2.55, memory_size: 0}
                    elapsed: 2.55
                    wo_count: 150
                    deals_count: 75
                    source: monday_live
                QUERY_EXTRA_FIELDS:
                  value:
                    answer: "The total open deal pipeline is $2.4M across 15 active deals."
                    trace:
                      - {step: "fetch_monday_data", elapsed_seconds: 0.82}
                      - {step: "ask_llm", elapsed_seconds: 1.45}
                      - {step: "complete", elapsed_seconds: 2.31, memory_size: 0}
                    elapsed: 2.31
                    wo_count: 150
                    deals_count: 75
                    source: monday_live
                QUERY_INJECTION:
                  value:
                    answer: "The pipeline data has been analyzed."
                    trace:
                      - {step: "fetch_monday_data", elapsed_seconds: 0.82}
                      - {step: "ask_llm", elapsed_seconds: 1.45}
                      - {step: "complete", elapsed_seconds: 2.31, memory_size: 0}
                    elapsed: 2.31
                    wo_count: 150
                    deals_count: 75
                    source: monday_live
                QUERY_MAX_LENGTH:
                  value:
                    answer: "Comprehensive analysis complete."
                    trace:
                      - {step: "fetch_monday_data", elapsed_seconds: 0.85}
                      - {step: "ask_llm", elapsed_seconds: 3.20}
                      - {step: "complete", elapsed_seconds: 4.10, memory_size: 0}
                    elapsed: 4.10
                    wo_count: 150
                    deals_count: 75
                    source: monday_live

        "422":
          description: |
            Schema validation failure.
            Triggered by: empty query, null required field, wrong type.
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    oneOf:
                      - type: string
                      - type: array
                        items:
                          type: object
                          additionalProperties: true
              examples:
                QUERY_EMPTY_STRING:
                  summary: Empty string rejected by minLength:1
                  value:
                    detail:
                      - loc: ["body", "query"]
                        msg: "ensure this value has at least 1 characters"
                        type: "value_error.any_str.min_length"
                QUERY_NULL_FIELD:
                  summary: Null for required non-nullable field
                  value:
                    detail:
                      - loc: ["body", "query"]
                        msg: "none is not an allowed value"
                        type: "type_error.none.not_allowed"
                QUERY_WRONG_TYPE:
                  summary: Integer sent where string is required
                  value:
                    detail:
                      - loc: ["body", "query"]
                        msg: "str type expected"
                        type: "type_error.str"

  /memory:
    get:
      summary: View memory — resiliency scenarios
      operationId: getMemoryResiliency
      tags:
        - Resiliency
      parameters:
        - name: session_id
          in: query
          required: false
          schema:
            type: string
          description: Optional. Defaults to 'default'.
          examples:
            GET_MEMORY_NO_PARAM:
              summary: No session_id — defaults to 'default'
              value: ""
            GET_MEMORY_NEVER_WRITTEN:
              summary: session_id for a session that never sent a query
              value: "session-brand-new"
      responses:
        "200":
          description: Returns session memory, empty list for new sessions
          content:
            application/json:
              schema:
                type: object
                required: [sessions]
                properties:
                  sessions:
                    type: array
                    items:
                      type: object
                      required: [query, answer, timestamp]
                      properties:
                        query:
                          type: string
                        answer:
                          type: string
                        timestamp:
                          type: string
                          format: date-time
              examples:
                GET_MEMORY_NO_PARAM:
                  summary: Empty list for default session
                  value:
                    sessions: []
                GET_MEMORY_NEVER_WRITTEN:
                  summary: Empty list for a brand-new session
                  value:
                    sessions: []
